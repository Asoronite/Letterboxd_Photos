<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Letterboxd Photos</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">

    <header class="popup-header">
      <img src="icons/icon48.png" alt="" class="popup-icon" />
      <h1>Letterboxd Photos</h1>
    </header>

    <div class="field">
      <label for="api-key">TMDB API Read Access Token</label>
      <div class="input-row">
        <input
          type="password"
          id="api-key"
          placeholder="eyJhbGciOiJIUzI1NiJ9..."
          autocomplete="off"
          spellcheck="false"
        />
        <button id="toggle-visibility" class="icon-btn" title="Show/hide key">👁</button>
      </div>
      <!-- Primary help: the guided onboarding. Pulses when no key is saved
           so first-time openers go here first, not to the raw TMDB link. -->
      <a href="#" id="open-guide" class="help-link">First time? Open the setup guide →</a>
    </div>

    <div id="status" class="status hidden"></div>

    <div class="actions">
      <button id="save-btn" class="btn-primary">Save &amp; Validate</button>
      <button id="clear-btn" class="btn-secondary">Clear</button>
    </div>

    <div id="saved-indicator" class="saved-indicator hidden">
      <span class="dot"></span> Key saved and working
    </div>

    <!-- Secondary, muted: the direct TMDB shortcut, for users who already
         know the drill and don't need the tutorial. -->
    <div class="popup-footer">
      <a
        href="https://www.themoviedb.org/settings/api"
        target="_blank"
        rel="noopener"
        class="footer-link"
      >Already have a key? Go to themoviedb.org →</a>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
